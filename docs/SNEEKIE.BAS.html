<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SNEEKIE.BAS — source listing — (c) July '88 by HerbySoft</title>
<style>
  :root{
    /* token palette — overwritten by the active theme in JS */
    --bg:#020503; --phos:#7dff7d; --glow:rgba(125,255,125,.13);
    --gut:#1f4a27; --ln:#46c95a; --kw:#d6ffd6; --fn:#7ff09a; --str:#5ad06f;
    --num:#a9f4b6; --com:#3c8f49; --id:#86ff86; --op:#54bf69; --pn:#367a43;
    --room1:#14171a; --room2:#0a0c0d; --room3:#060708;
    --bezel1:#2c3034; --bezel2:#1c1f22;
    --ink:#98a1a6; --ink-dim:#5b6367; --line:#33383d;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:radial-gradient(1300px 760px at 50% 12%, var(--room1) 0%, var(--room2) 55%, var(--room3) 100%);
    color:var(--ink);
    font:13px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, "Cascadia Mono", monospace;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:24px 12px 22px;
    -webkit-text-size-adjust:100%;
  }
  header{ text-align:center; margin-bottom:14px; }
  h1{
    margin:0; font-size:clamp(20px,5vw,30px); font-weight:700;
    letter-spacing:.14em; color:var(--phos);
    text-shadow:0 0 18px var(--glow);
  }
  h1 .hl{ opacity:.7; }                 /* the .BAS bit, slightly dimmer */
  h1 .hrt{ color:var(--phos); margin:0 .35em; }
  header .sub{
    margin:9px 0 0; color:var(--ink-dim);
    letter-spacing:.13em; text-transform:uppercase; font-size:10.5px;
  }

  /* ---- sticky toolbar ---- */
  .bar{
    position:sticky; top:0; z-index:5;
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-items:center;
    width:100%; max-width:980px;
    padding:10px 6px; margin-bottom:14px;
    background:linear-gradient(var(--room1), rgba(20,23,26,.86));
    backdrop-filter:blur(4px);
    border-bottom:1px solid var(--line);
  }
  .bar .grp{ display:flex; gap:6px; }
  .bar .spacer{ flex:1 1 14px; }
  button,a.btn{
    background:#16181b; color:var(--ink);
    border:1px solid var(--line); border-radius:3px;
    font:inherit; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    padding:7px 12px; cursor:pointer; text-decoration:none; white-space:nowrap;
    transition:color .12s, border-color .12s, box-shadow .12s;
  }
  button:hover,a.btn:hover{ color:var(--phos); border-color:var(--phos); }
  button[aria-pressed="true"]{
    color:var(--phos); border-color:var(--phos);
    box-shadow:0 0 12px -5px var(--phos);
  }

  /* ---- the monitor ---- */
  #bezel{
    position:relative; width:100%; max-width:980px;
    background:linear-gradient(173deg, var(--bezel1), var(--bezel2) 70%);
    border-radius:14px; padding:18px;
    box-shadow:
      0 30px 70px -24px rgba(0,0,0,.95),
      inset 0 1px 0 rgba(255,255,255,.07),
      inset 0 -2px 6px rgba(0,0,0,.45);
    animation:poweron .5s ease-out both .06s;
  }
  @keyframes poweron{ from{ opacity:0; transform:scale(.99); } to{ opacity:1; transform:none; } }
  .screen{
    position:relative; background:var(--bg); border-radius:5px;
    padding:16px 4px 16px 0; overflow:hidden;
    box-shadow:0 0 0 2px #000, 0 0 38px -6px var(--glow), inset 0 0 60px rgba(0,0,0,.5);
  }
  /* faint scanlines + vignette over the glass */
  .screen::after{
    content:""; position:absolute; inset:0; pointer-events:none; border-radius:5px;
    background:
      repeating-linear-gradient(rgba(0,0,0,0) 0 1px, rgba(0,0,0,.16) 1px 2px),
      radial-gradient(120% 130% at 50% 50%, transparent 62%, rgba(0,0,0,.4) 100%);
    mix-blend-mode:multiply;
  }

  /* ---- the listing ---- */
  .listing{
    overflow-x:auto;
    font-size:12.5px; line-height:1.5;
    color:var(--id);
    -webkit-font-smoothing:none;
  }
  .line{ display:flex; width:max-content; min-width:100%; }
  .line:hover{ background:rgba(255,255,255,.035); }
  .gut{
    position:sticky; left:0; z-index:1;
    flex:0 0 auto; width:3.4em; padding:0 .9em 0 .6em;
    text-align:right; color:var(--gut); background:var(--bg);
    user-select:none; -webkit-user-select:none;
  }
  .code{ white-space:pre; padding-right:24px; }

  /* token colors */
  .ln { color:var(--ln);  font-weight:600; }
  .kw { color:var(--kw);  font-weight:600; }
  .fn { color:var(--fn);  }
  .op { color:var(--op);  }
  .str{ color:var(--str); }
  .num{ color:var(--num); }
  .com{ color:var(--com); font-style:italic; }
  .id { color:var(--id);  }
  .pn { color:var(--pn);  }

  footer{
    margin-top:18px; max-width:760px; text-align:center;
    font-size:10.5px; color:var(--ink-dim); line-height:1.75;
  }
  footer .plaque{ border-top:1px solid var(--line); padding-top:12px; letter-spacing:.04em; }
  footer a{ color:var(--ink); text-decoration:none; border-bottom:1px dotted var(--ink-dim); }
  footer a:hover{ color:var(--phos); border-color:var(--phos); }

  /* ---- print: a clean paper listing ---- */
  @media print{
    @page{ margin:14mm; }
    body{ background:#fff; color:#222; display:block; padding:0; }
    .bar, header .sub, footer .link, .screen::after{ display:none !important; }
    header{ margin:0 0 6mm; }
    h1{ color:#111; text-shadow:none; }
    h1 .hrt{ color:#c0392b; }
    #bezel{ max-width:none; background:#fff; box-shadow:none; border-radius:0; padding:0; animation:none; }
    .screen{ background:#fff; box-shadow:none; padding:0; }
    .listing{ overflow:visible; font-size:9.5px; color:#222; -webkit-font-smoothing:auto; }
    .line{ width:auto; min-width:0; }
    .line:hover{ background:none; }
    .code{ white-space:pre-wrap; overflow-wrap:anywhere; }
    .gut{ position:static; background:none; color:#bbb; }
    /* ink-on-paper syntax colors */
    .ln{color:#7a3ea0} .kw{color:#9a1f6b} .fn{color:#0a7a52} .op{color:#555}
    .str{color:#a85d00} .num{color:#1a5fb4} .com{color:#888} .id{color:#222} .pn{color:#888}
  }
</style>
</head>

const SRC = new TextDecoder().decode(Uint8Array.from(atob(B64), c => c.charCodeAt(0)));

/* ---------- GW-BASIC token classification ---------- */
const KW = new Set(('REM DEFINT DEFSNG DEFDBL DEFSTR SCREEN WIDTH CLS RANDOMIZE DEF SEG ' +
  'POKE DIM LOCATE PRINT USING LPRINT FOR TO STEP NEXT IF THEN ELSE GOTO GOSUB RETURN ' +
  'ON WHILE WEND SOUND PLAY BEEP END STOP DATA READ RESTORE LET INPUT LINE GET PUT OPEN ' +
  'CLOSE CALL RUN COLOR PSET PRESET CIRCLE PAINT DRAW OUT WAIT SWAP ERASE CLEAR OPTION BASE').split(' '));
const FN = new Set(('CHR$ STR$ STRING$ SPACE$ LEFT$ RIGHT$ MID$ HEX$ OCT$ INKEY$ INPUT$ ASC LEN ' +
  'INSTR INT FIX ABS SGN SQR SIN COS TAN ATN LOG EXP RND VAL PEEK TIMER POS CSRLIN VARPTR ' +
  'FRE SPC TAB').split(' '));
const OPWORD = new Set('AND OR NOT XOR EQV IMP MOD'.split(' '));

const isWordStart = c => (c >= 'A' && c <= 'Z') || (c >= 'a' && c <= 'z');
const isWord      = c => isWordStart(c) || (c >= '0' && c <= '9');
const isDigit     = c => c >= '0' && c <= '9';
const isHex       = c => isDigit(c) || (c >= 'A' && c <= 'F') || (c >= 'a' && c <= 'f');

/* scan a run of code (no leading line number) into [class, text] tokens */
function scanCode(s, out){
  let i = 0; const n = s.length;
  while(i < n){
    const c = s[i];
    if(c === ' ' || c === '\t'){ let j = i; while(j < n && (s[j] === ' ' || s[j] === '\t')) j++; out.push(['ws', s.slice(i, j)]); i = j; continue; }
    if(c === "'"){ out.push(['com', s.slice(i)]); break; }                       // apostrophe comment → rest of line
    if(c === '"'){ let j = i + 1; while(j < n && s[j] !== '"') j++; if(j < n) j++; out.push(['str', s.slice(i, j)]); i = j; continue; }
    if(c === '&' && (s[i+1] === 'H' || s[i+1] === 'h')){ let j = i + 2; while(j < n && isHex(s[j])) j++; out.push(['num', s.slice(i, j)]); i = j; continue; }
    if(isDigit(c) || (c === '.' && isDigit(s[i+1] || ''))){ let j = i; while(j < n && (isDigit(s[j]) || s[j] === '.')) j++; out.push(['num', s.slice(i, j)]); i = j; continue; }
    if(isWordStart(c)){
      let j = i; while(j < n && isWord(s[j])) j++;
      if(s[j] === '$') j++;                                                       // CHR$, A$, INKEY$ …
      const w = s.slice(i, j), up = w.toUpperCase();
      if(up === 'REM'){ out.push(['kw', w]); out.push(['com', s.slice(j)]); break; }
      out.push([KW.has(up) ? 'kw' : FN.has(up) ? 'fn' : OPWORD.has(up) ? 'op' : 'id', w]);
      i = j; continue;
    }
    if('=+-*/\\^<>'.includes(c)){
      const two = s.substr(i, 2);
      if(two === '<=' || two === '>=' || two === '<>' || two === '><'){ out.push(['op', two]); i += 2; continue; }
      out.push(['op', c]); i++; continue;
    }
    out.push(['pn', c]); i++;                                                     // : ; , ( ) etc.
  }
}

/* one physical line → tokens (split off the leading BASIC line number first) */
function tokenizeLine(line){
  const out = [];
  const m = /^(\s*)(\d+)(?=\D|$)/.exec(line);
  if(m){
    if(m[1]) out.push(['ws', m[1]]);
    out.push(['ln', m[2]]);
    scanCode(line.slice(m[0].length), out);
  } else {
    scanCode(line, out);                                                          // header ' comments + blank lines
  }
  return out;
}

/* ---------- render ---------- */
const listing = document.getElementById('listing');
const lines = SRC.replace(/\n$/, '').split('\n');
const frag = document.createDocumentFragment();
lines.forEach((line, idx) => {
  const row = document.createElement('div'); row.className = 'line';
  const gut = document.createElement('span'); gut.className = 'gut'; gut.textContent = idx + 1;
  const code = document.createElement('span'); code.className = 'code';
  for(const [cls, text] of tokenizeLine(line)){
    if(cls === 'ws'){ code.appendChild(document.createTextNode(text)); }
    else { const sp = document.createElement('span'); sp.className = cls; sp.textContent = text; code.appendChild(sp); }
  }
  if(!code.childNodes.length) code.appendChild(document.createTextNode('​')); // keep blank rows tall
  row.append(gut, code);
  frag.appendChild(row);
});
listing.appendChild(frag);
document.getElementById('stat').textContent =
  lines.length + ' lines · GW-BASIC · ' + SRC.length.toLocaleString() + ' bytes';

function lsGet(k){ try{ return localStorage.getItem(k); }catch(_){ return null; } }
function lsSet(k, v){ try{ localStorage.setItem(k, v); }catch(_){ } }

function applyTheme(name){
  const t = THEMES[name] || THEMES.hercules;
  const r = document.documentElement.style;
  for(const k in t) r.setProperty('--' + k, t[k]);
  document.querySelectorAll('#themes button').forEach(b =>
    b.setAttribute('aria-pressed', String(b.dataset.theme === name)));
  lsSet('sneekie.theme', name);                                                   // same key the game uses
}
document.querySelectorAll('#themes button').forEach(b =>
  b.addEventListener('click', () => applyTheme(b.dataset.theme)));

applyTheme(THEMES[lsGet('sneekie.theme')] ? lsGet('sneekie.theme') : 'hercules');
