  <body class="page-index">
    <main id="main" tabindex="-1">
      <header class="hero">
        <h1 class="page-title">Het spel uit 1988</h1>
        <p class="sub">Een MS-DOS tekstspel uit 1988 &mdash; herboren als browserspel</p>
      </header>
      <div id="bezel">
        <div id="tube">
          <canvas id="screen" width="640" height="384" role="img" aria-label="Sneekie spelscherm"></canvas>
          <div id="glass" aria-hidden="true"></div>
          <div id="power" aria-hidden="true"></div>
        </div>
        <div id="panel" aria-hidden="true">
          <span class="logo">Acme Corporation</span>
          <span class="led"></span>
          <span class="knobs"><i></i><i></i></span>
        </div>
        <!-- touch controls that live INSIDE the bezel, so they survive fullscreen
       (only #bezel is fullscreened — the sibling #touchbar below is not rendered).
       Shown only in fullscreen on a coarse pointer; see CSS. -->
        <div id="fstouch">
          <button type="button" data-key="esc">ESC</button>
          <button type="button" data-key="left" aria-label="Links">&#8592;</button>
          <button type="button" data-key="up" aria-label="Omhoog">&#8593;</button>
          <button type="button" data-key="down" aria-label="Omlaag">&#8595;</button>
          <button type="button" data-key="right" aria-label="Rechts">&#8594;</button>
          <button type="button" data-key="y">J</button>
          <button type="button" data-key="n">N</button>
          <button type="button" data-key="f9">F9</button>
          <button type="button" data-key="f10">F10</button>
        </div>
      </div>
      <div id="controls">
        <div class="grp" id="themes">
          <button type="button" data-theme="hercules">Groen</button>
          <button type="button" data-theme="amber">Amber</button>
          <button type="button" data-theme="cga">CGA</button>
        </div>
        <div class="grp">
          <button type="button" id="mute">Geluid: aan</button>
          <button type="button" id="fs">Volledig scherm</button>
        </div>
      </div>
      <div id="touchbar">
        <button type="button" data-key="esc">ESC</button>
        <button type="button" data-key="y">J</button>
        <button type="button" data-key="n">N</button>
      </div>
      <p id="hint">
        <span class="kb">Pijltjestoetsen sturen de slang &middot; &lt;ESC&gt; = opgeven als je vastzit<br />F9 = extra leven &middot; F10 = level overslaan &middot; elke toets gaat verder</span>
        <span class="tc">Veeg om te sturen &middot; tik = willekeurige toets</span>
      </p>
    </main>

    <script src="../js/i18n.js"></script>
    <script src="../js/site.js"></script>
    <script src="../js/game.js"></script>
  </body>
