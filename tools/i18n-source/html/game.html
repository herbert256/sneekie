  </head>
  <body class="page-index">
    <main id="main" tabindex="-1" data-lang-template>
      <header class="hero">
        <h1 class="page-title" data-i18n="gameTitle">The 1988 Game</h1>
        <p class="sub" data-i18n="gameSub">A MS-DOS text game from 1988 &mdash; reborn as a browser game</p>
      </header>
      <div id="bezel">
        <div id="tube">
          <canvas id="screen" width="640" height="384" role="img" aria-label="Sneekie game screen" data-i18n-aria="gameCanvas"></canvas>
          <div id="glass" aria-hidden="true"></div>
          <div id="power" aria-hidden="true"></div>
        </div>
        <div id="panel" aria-hidden="true">
          <span class="logo">Acme Corporation</span>
          <span class="led"></span>
          <span class="knobs"><i></i><i></i></span>
        </div>
        <!-- touch controls that live INSIDE the bezel, so they survive fullscreen
       (only #bezel is fullscreened — the sibling #touchbar below is not rendered).
       Shown only in fullscreen on a coarse pointer; see CSS. -->
        <div id="fstouch">
          <button type="button" data-key="esc">ESC</button>
          <button type="button" data-key="left" aria-label="Left" data-i18n-aria="dirLeft">&#8592;</button>
          <button type="button" data-key="up" aria-label="Up" data-i18n-aria="dirUp">&#8593;</button>
          <button type="button" data-key="down" aria-label="Down" data-i18n-aria="dirDown">&#8595;</button>
          <button type="button" data-key="right" aria-label="Right" data-i18n-aria="dirRight">&#8594;</button>
          <button type="button" data-key="y" data-i18n-text="yesKey">Y</button>
          <button type="button" data-key="n" data-i18n-text="noKey">N</button>
          <button type="button" data-key="f9">F9</button>
          <button type="button" data-key="f10">F10</button>
        </div>
      </div>
      <div id="controls">
        <div class="grp" id="themes">
          <button type="button" data-theme="hercules" data-i18n="themeGreen">Green</button>
          <button type="button" data-theme="amber" data-i18n="themeAmber">Amber</button>
          <button type="button" data-theme="cga" data-i18n="themeCga">CGA</button>
        </div>
        <div class="grp">
          <button type="button" id="mute" data-i18n="soundOn">Sound: on</button>
          <button type="button" id="fs" data-i18n="fullscreen">Fullscreen</button>
        </div>
      </div>
      <div id="touchbar">
        <button type="button" data-key="esc">ESC</button>
        <button type="button" data-key="y" data-i18n-text="yesKey">Y</button>
        <button type="button" data-key="n" data-i18n-text="noKey">N</button>
      </div>
      <p id="hint">
        <span class="kb" data-i18n="gameHintKeys">Arrow keys steer the snake &middot; &lt;ESC&gt; = give up when stuck<br />F9 = extra life &middot; F10 = skip level &middot; any key continues</span>
        <span class="tc" data-i18n="gameHintTouch">Swipe to steer &middot; tap = any key</span>
      </p>
      <figure class="closing-figure">
        <img loading="lazy" width="1200" height="676" src="../images/pages/game-closing.webp" alt="A glowing Sneekie snake bursting through a CRT game screen while hearts, clubs, stones, and maze pieces fly outward." />
      </figure>
    </main>
